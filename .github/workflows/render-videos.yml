name: Daily Video Pipeline

# Renders three vertical videos per sign per day:
#   - morning : sign + reading body         (~30s, music: morning-music.mp3)
#   - quote   : philosopher quote + author  (~22s)
#   - night   : peaceful thought            (~28s)
#
# Each type runs as its own scheduled cron entry so they can drop at
# different times of day. Manual workflow_dispatch lets ops render any
# subset for testing.
#
# The per-sign Vercel cron at /api/cron/daily/[sign] runs at 0:00–0:11 UTC
# and pre-populates the reading cache. Video crons run at 1:00 UTC
# (morning), 12:00 UTC (quote), and 22:00 UTC (night) so the API serves
# cache hits in <100ms per sign.
on:
  schedule:
    - cron: '0 1 * * *'   # morning videos — 1:00 UTC
    - cron: '0 12 * * *'  # quote videos   — midday UTC
    - cron: '0 22 * * *'  # night videos   — 22:00 UTC (~6pm ET)
  workflow_dispatch:
    inputs:
      type:
        description: 'Video type — morning (reading), quote (philosopher), or night (peaceful thought)'
        required: false
        default: 'morning'
        type: choice
        options: [morning, quote, night]
      sign:
        description: 'Render a single sign (leave empty for all 12)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no rendering or posting)'
        required: false
        type: boolean
        default: false
      no_post:
        description: 'Skip social posting (default: true — social is off until accounts are connected)'
        required: false
        type: boolean
        default: true
      ramp:
        description: 'Number of signs to post (only relevant if no_post is unchecked)'
        required: false
        default: '4'

concurrency:
  # One pipeline at a time across all types — they share Blob upload paths
  # under videos/{date}/ and ElevenLabs/edge-tts rate limits. Per-type
  # parallelism would pin Anthropic/ElevenLabs RPMs simultaneously and
  # overwrite shared public/audio/ files mid-flight.
  group: render-videos
  cancel-in-progress: false

jobs:
  render-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install edge-tts (voiceover fallback)
        run: pip3 install --user edge-tts

      - name: Install ffmpeg (quality gate)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build CLI args
        id: args
        env:
          EVENT_NAME: ${{ github.event_name }}
          # Schedule events expose the cron expression that fired so we can
          # map it back to a video type without input plumbing.
          CRON_EXPR: ${{ github.event.schedule }}
          INPUT_TYPE: ${{ inputs.type }}
          INPUT_SIGN: ${{ inputs.sign }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_NO_POST: ${{ inputs.no_post }}
          INPUT_RAMP: ${{ inputs.ramp }}
        run: |
          set -euo pipefail
          ARGS=""

          # Pick the type. Schedule events use the cron expression; manual
          # dispatches honor the input. Allowlist + default to morning so
          # nothing typoed slips through.
          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$CRON_EXPR" in
              "0 1 * * *")  TYPE="morning" ;;
              "0 12 * * *") TYPE="quote" ;;
              "0 22 * * *") TYPE="night" ;;
              *) TYPE="morning" ;;
            esac
            ARGS="--no-post --type $TYPE"
          else
            case "$INPUT_TYPE" in
              morning|quote|night) TYPE="$INPUT_TYPE" ;;
              *) TYPE="morning" ;;
            esac
            ARGS="--type $TYPE"
            if [ "$INPUT_DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
            if [ "$INPUT_NO_POST" = "true" ]; then ARGS="$ARGS --no-post"; fi
            if [ -n "$INPUT_SIGN" ]; then
              case "$INPUT_SIGN" in
                aries|taurus|gemini|cancer|leo|virgo|libra|scorpio|sagittarius|capricorn|aquarius|pisces)
                  ARGS="$ARGS --sign $INPUT_SIGN"
                  ;;
                *)
                  echo "::error::Invalid sign input: $INPUT_SIGN"
                  exit 1
                  ;;
              esac
            fi
            RAMP_VALUE="${INPUT_RAMP:-4}"
            if ! echo "$RAMP_VALUE" | grep -Eq '^([1-9]|1[0-2])$'; then
              echo "::error::Invalid ramp input: $RAMP_VALUE"
              exit 1
            fi
            ARGS="$ARGS --ramp $RAMP_VALUE"
          fi

          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "Rendering type: $TYPE"

      - name: Render videos
        env:
          ARGS: ${{ steps.args.outputs.args }}
          HOROSCOPE_API_URL: ${{ secrets.HOROSCOPE_API_URL || 'https://api.gettodayshoroscope.com' }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # AYRSHARE_API_KEY intentionally not exposed — see PR #75 commit msg.
        run: npx tsx scripts/render-and-post.ts $ARGS
