name: Daily Video Pipeline

# Renders 12 daily horoscope videos (1080x1920, 60s) and uploads them to
# Vercel Blob. Social posting is intentionally OFF until the operator
# connects social accounts and sets AYRSHARE_API_KEY — the script's
# `--no-post` flag is hardcoded into the scheduled run and defaults to
# `true` for manual dispatches.
#
# The per-sign Vercel cron at /api/cron/daily/[sign] runs at 0:00–0:11 UTC
# and pre-populates the reading cache. This pipeline runs an hour later so
# the API serves cache hits in <100ms per sign.
on:
  schedule:
    # 1:00 UTC daily — one hour after the last per-sign cron tick (0:11 UTC)
    # so all 12 readings are guaranteed cached before video render starts.
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      sign:
        description: 'Render a single sign (leave empty for all 12)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no rendering or posting)'
        required: false
        type: boolean
        default: false
      no_post:
        description: 'Skip social posting (default: true — social is off until accounts are connected)'
        required: false
        type: boolean
        default: true
      ramp:
        description: 'Number of signs to post (default 4) — only relevant if no_post is unchecked'
        required: false
        default: '4'

jobs:
  render-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Remotion
        run: npx remotion ensure-chrome

      - name: Build CLI args
        id: args
        # Scheduled runs always pass --no-post. Manual runs honor the input
        # (which defaults to true). Inputs are bound to env vars first to
        # avoid shell-injection from any unsanitized input value.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SIGN: ${{ inputs.sign }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_NO_POST: ${{ inputs.no_post }}
          INPUT_RAMP: ${{ inputs.ramp }}
        run: |
          set -euo pipefail
          ARGS=""
          if [ "$EVENT_NAME" = "schedule" ]; then
            ARGS="--no-post"
          else
            if [ "$INPUT_DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
            if [ "$INPUT_NO_POST" = "true" ]; then ARGS="$ARGS --no-post"; fi
            # Validate sign against an allowlist before passing to the script.
            if [ -n "$INPUT_SIGN" ]; then
              case "$INPUT_SIGN" in
                aries|taurus|gemini|cancer|leo|virgo|libra|scorpio|sagittarius|capricorn|aquarius|pisces)
                  ARGS="$ARGS --sign $INPUT_SIGN"
                  ;;
                *)
                  echo "::error::Invalid sign input: $INPUT_SIGN"
                  exit 1
                  ;;
              esac
            fi
            # Validate ramp is a small positive integer (1-12).
            RAMP_VALUE="${INPUT_RAMP:-4}"
            if ! echo "$RAMP_VALUE" | grep -Eq '^([1-9]|1[0-2])$'; then
              echo "::error::Invalid ramp input: $RAMP_VALUE"
              exit 1
            fi
            ARGS="$ARGS --ramp $RAMP_VALUE"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Render videos
        env:
          ARGS: ${{ steps.args.outputs.args }}
          # API source for readings — script fetches /api/horoscope?sign=X
          # so it never needs Redis credentials directly.
          HOROSCOPE_API_URL: ${{ secrets.HOROSCOPE_API_URL || 'https://api.gettodayshoroscope.com' }}
          # Required: Vercel Blob upload destination
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          # Optional: voiceover (script falls back to silent video if absent)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional: only used when --no-post is NOT set (manual override)
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
          # Optional: daily spot-check notification with sample video
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx tsx scripts/render-and-post.ts $ARGS
