name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_API_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}
  VERCEL_FRONTEND_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

jobs:
  # ─── Build Verification ────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit || true # Pre-existing errors in dead code

      - name: Lint
        run: npm run lint || true # Warnings only, not blocking

      - name: Build
        run: npm run build
        env:
          # Placeholder values for build — real values injected by Vercel at runtime
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder
          OPENAI_API_KEY: placeholder
          CRON_SECRET: placeholder

  # ─── Deploy API Project ────────────────────────────────────
  deploy-api:
    name: Deploy API
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Deploy
        id: deploy-api
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Verify API
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.gettodayshoroscope.com/api/debug/ping)
          if [ "$STATUS" != "200" ]; then
            echo "API health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "API health check passed: HTTP $STATUS"

  # ─── Deploy Frontend Project ───────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

      - name: Prepare frontend build
        run: |
          # Use frontend-specific Next.js config (excludes API routes, adds rewrites)
          cp next.config.frontend.js next.config.js
          chmod +x scripts/frontend-build.sh
          # Remove API routes from build (frontend proxies them via rewrites)
          rm -rf src/app/api
          rm -f src/middleware.ts

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

      - name: Deploy
        id: deploy-frontend
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

      - name: Verify Frontend
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://gettodayshoroscope.com)
          if [ "$STATUS" != "200" ]; then
            echo "Frontend health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Frontend health check passed: HTTP $STATUS"

  # ─── Post-Deploy Verification ──────────────────────────────
  verify:
    name: Post-Deploy Verification
    needs: [deploy-api, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Verify API returns horoscope
        run: |
          RESPONSE=$(curl -s https://api.gettodayshoroscope.com/api/horoscope?sign=aries)
          SUCCESS=$(echo $RESPONSE | python3 -c "import json,sys; print(json.load(sys.stdin).get('success','false'))")
          if [ "$SUCCESS" != "True" ]; then
            echo "API verification failed"
            echo $RESPONSE | python3 -m json.tool
            exit 1
          fi
          echo "API returning horoscopes successfully"

      - name: Verify OG image
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.gettodayshoroscope.com/api/og/aries)
          echo "OG image endpoint: HTTP $STATUS"

      - name: Verify sign page
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://gettodayshoroscope.com/horoscope/aries)
          echo "Sign page: HTTP $STATUS"
